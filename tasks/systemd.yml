---

- name: Ensure systemd folder exists
  ansible.builtin.file:
    dest: /etc/systemd/system
    state: directory
    mode: '0755'

- name: Environment file
  when:
    - openwebui_webproxy_env_enable | bool
    - openwebui_webproxy_env_file | length > 0
    - openwebui_webproxy_env_content | length > 0
  block:
    - name: Set custom env file for semaphoreui
      ansible.builtin.copy:
        content: "{{ openwebui_webproxy_env_content }}"
        dest: "{{ openwebui_webproxy_env_file }}"
        mode: '0640'
        owner: root
        group: "{{ openwebui_user }}"

- name: Ensure systemd unit files are configured
  ansible.builtin.template:
    src: "systemd-open-webui.conf.j2"
    dest: "/etc/systemd/system/open-webui.service"
    mode: '0644'
  notify:
    - Reload systemd
    - Restart openwebui

- name: Ensure services are enabled and started
  ansible.builtin.service:
    name: open-webui
    state: started
    enabled: yes
  when:
    - not is_container|bool
